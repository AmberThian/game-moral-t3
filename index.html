<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabaran Perayaan Adi - Pendidikan Moral T3</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .game-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 4px solid #fff;
        }
        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #4a4a4a;
        }
        .hearts { color: #e74c3c; font-size: 22px; }
        .avatar-box {
            background-color: #ffeaa7;
            padding: 15px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px auto;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .story-text {
            font-size: 18px;
            color: #2d3436;
            margin-bottom: 25px;
            line-height: 1.6;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #fdcb6e;
        }
        .choice-btn {
            background: #0984e3;
            color: white;
            border: none;
            padding: 15px 20px;
            margin: 10px 0;
            width: 100%;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #06528e;
            transition: all 0.1s ease;
        }
        .choice-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #06528e;
        }
        .choice-btn.option-b { background: #e84393; box-shadow: 0 5px 0 #b31159; }
        .choice-btn.option-b:active { box-shadow: 0 1px 0 #b31159; }
        
        .popup-feedback {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 10;
            width: 85%;
            max-width: 380px;
        }
        .popup-overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            z-index: 5;
        }
        .popup-emoji { font-size: 50px; margin-bottom: 10px; }
        .popup-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        .hide { display: none; }
    </style>
</head>
<body>

<div class="game-card" id="main-card">
    <div class="header-status">
        <div>Tahap: <span id="level-num">1</span>/3</div>
        <div class="hearts" id="heart-box">❤️❤️❤️</div>
    </div>

    <div class="avatar-box" id="avatar">👦🏻</div>
    <div class="story-text" id="story-display">Memuatkan kisah perayaan Adi...</div>

    <div id="choices-box">
        <!-- Butang pilihan akan muncul di sini -->
    </div>
</div>

<!-- Skrin Tamat Game (Menang/Kalah) -->
<div class="game-card hide" id="end-card">
    <div class="popup-emoji" id="end-emoji">🏆</div>
    <h2 id="end-title">Syabas! Anda Hebat!</h2>
    <p style="font-size: 16px; color:#666;" id="end-desc">Adi berjaya menyambut perayaan dengan gembira dan sentiasa mengingati Tuhan!</p>
    <button class="choice-btn" style="background:#2ecc71; box-shadow:0 5px 0 #219653;" onclick="window.location.reload()">Main Semula 🔄</button>
</div>

<!-- Popup Maklum Balas Ringkas -->
<div class="popup-overlay" id="overlay"></div>
<div class="popup-feedback" id="feedback-popup">
    <div class="popup-emoji" id="pop-emoji">✨</div>
    <h3 id="pop-title">Betul!</h3>
    <p id="pop-text">Penjelasan moral di sini.</p>
    <button class="popup-btn" id="pop-next-btn" onclick="closePopup()">Teruskan Misi ➡️</button>
</div>

<script>
    const missions = [
        {
            avatar: "👦🏻",
            story: "Esok ialah hari perayaan! Adi melihat ibu dan ayahnya sangat sibuk menghias rumah dan memasak makanan tradisi. Apakah tindakan Adi sebagai tanda bersyukur kepada Tuhan?",
            choices: [
                { text: "👍 Membantu ibu bapa dengan gembira sambil berdoa agar perayaan berjalan lancar.", correct: true },
                { text: "🎮 Duduk di ruang tamu bermain game telefon kerana menganggap itu urusan orang tua.", correct: false }
            ],
            moral: "Bagus! Membantu keluarga dengan ikhlas dan berdoa adalah tanda anak yang mengamalkan nilai Kepercayaan kepada Tuhan."
        },
        {
            avatar: "🕌",
            story: "Pagi perayaan telah tiba! Sebelum menikmati juadah yang sedap, keluarga Adi berkumpul di ruang tamu untuk melakukan upacara keagamaan/berdoa. Adi sepatutnya...",
            choices: [
                { text: "🍗 Mengendap makanan di dapur dan makan sorang-sorang terlebih dahulu.", correct: false },
                { text: "🙏 Mengambil bahagian dalam doa bersama keluarga dengan penuh hormat.", correct: true }
            ],
            moral: "Tepat sekali! Mengutamakan ibadah dan doa sebelum berseronok membuktikan kita sentiasa mengutamakan ajaran agama."
        },
        {
            avatar: "🧑‍🤝‍🧑",
            story: "Rakan Adi yang berbeza agama datang beraya. Mereka memakai pakaian tradisional masing-masing dengan gembira. Bagaimanakah Adi boleh mengekalkan suasana gembira ini?",
            choices: [
                { text: "❤️ Menyambut mereka dengan senyuman dan menghormati perbezaan cara mereka merayakan sesuatu.", correct: true },
                { text: "❌ Mentertawakan pakaian tradisional rakan kerana berbeza dengan pakaian Adi.", correct: false }
            ],
            moral: "Hebat! Tuhan menciptakan manusia berbilang kaum. Menghormati rakan adalah bukti kita patuh kepada ajaran Tuhan agar hidup harmoni."
        }
    ];

    let currentLevel = 0;
    let lives = 3;

    const storyDisplay = document.getElementById('story-display');
    const choicesBox = document.getElementById('choices-box');
    const avatar = document.getElementById('avatar');
    const levelNum = document.getElementById('level-num');
    const heartBox = document.getElementById('heart-box');
    
    const overlay = document.getElementById('overlay');
    const popup = document.getElementById('feedback-popup');
    const popEmoji = document.getElementById('pop-emoji');
    const popTitle = document.getElementById('pop-title');
    const popText = document.getElementById('pop-text');

    function updateHearts() {
        heartBox.innerText = "❤️".repeat(lives) + "💔".repeat(3 - lives);
    }

    function playLevel() {
        if (currentLevel >= missions.length) {
            showEndScreen(true);
            return;
        }
        
        levelNum.innerText = currentLevel + 1;
        let m = missions[currentLevel];
        avatar.innerText = m.avatar;
        storyDisplay.innerText = m.story;
        choicesBox.innerHTML = "";

        m.choices.forEach((choice, index) => {
            let btn = document.createElement('button');
            btn.className = `choice-btn ${index === 1 ? 'option-b' : ''}`;
            btn.innerText = choice.text;
            btn.onclick = () => evaluateChoice(choice.correct, m.moral);
            choicesBox.appendChild(btn);
        });
    }

    function evaluateChoice(isCorrect, moralText) {
        overlay.style.display = "block";
        popup.style.display = "block";

        if (isCorrect) {
            popEmoji.innerText = "🎉";
            popTitle.innerText = "Jawapan Tepat!";
            popText.innerText = moralText;
            document.getElementById('pop-next-btn').innerText = "Teruskan Misi ➡️";
            currentLevel++;
        } else {
            lives--;
            updateHearts();
            popEmoji.innerText = "😢";
            popTitle.innerText = "Kurang Tepat";
            popText.innerText = "Tindakan ini tidak mencerminkan nilai Kepercayaan kepada Tuhan. Sila cuba lagi!";
            
            if (lives <= 0) {
                document.getElementById('pop-next-btn').innerText = "Lihat Keputusan 💔";
            } else {
                document.getElementById('pop-next-btn').innerText = "Cuba Lagi 🔄";
            }
        }
    }

    function closePopup() {
        overlay.style.display = "none";
        popup.style.display = "none";
        
        if (lives <= 0) {
            showEndScreen(false);
        } else {
            playLevel();
        }
    }

    function showEndScreen(isWin) {
        document.getElementById('main-card').classList.add('hide');
        const endCard = document.getElementById('end-card');
        endCard.classList.remove('hide');
        
        if (!isWin) {
            document.getElementById('end-emoji').innerText = "❌";
            document.getElementById('end-title').innerText = "Permainan Tamat!";
            document.getElementById('end-desc').innerText = "Jangan putus asa! Mari cuba lagi untuk fahami cara meraikan perayaan berlandaskan ajaran agama.";
        }
    }

    // Mula Permainan
    playLevel();
</script>

</body>
</html>
